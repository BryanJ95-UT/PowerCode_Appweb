<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Pagos | Power Code</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <header class="nav">
    <div class="brand">
      <h1>Power Code</h1>
    </div>

    <nav class="menu">
      <a href="index.html">Inicio</a>
      <a href="rutinas.html">Rutinas</a>
      <a href="productos.html">Productos</a>
      <a href="gyms.html">Gimnasios</a>
      <a href="memberships.html">Membresías</a>
      <a href="contacto.html">Contacto</a>
      <a href="login.html">Login</a>
    </nav>
  </header>

  <!-- CONTENIDO -->
  <main class="page">

    <div class="grid">

      <!-- RESUMEN DEL PLAN -->
      <div class="card">
        <h2 class="title-section">Resumen de compra</h2>
        <p><strong>Plan:</strong> Premium</p>
        <p><strong>Precio:</strong> $500 MXN / mes</p>
        <p><strong>Acceso:</strong> Completo</p>
      </div>

      <!-- FORMULARIO DE PAGO -->
      <div class="card">

        <h2 class="title-section">Datos de pago</h2>

        <form>

          <label>Nombre en la tarjeta</label>
          <input type="text" placeholder="Nombre completo">

          <br><br>

          <label>Número de tarjeta</label>
          <input type="text" placeholder="1234 5678 9012 3456">

          <br><br>

          <label>Fecha de expiración</label>
          <input type="text" placeholder="MM/AA">

          <br><br>

          <label>CVV</label>
          <input type="text" placeholder="123">

          <br><br>

          <button class="btn primary" type="submit">Pagar</button>

        </form>

      </div>

    </div>

  </main>

</body>
</html>
