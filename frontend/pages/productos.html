<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Productos | Power Code</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="dash-header">
    <a class="dash-brand" href="../index.html">
      <img src="../img/logo.svg" alt="Power Code">
      <span>Productos</span>
    </a>
    <nav class="dash-actions">
      <a href="../index.html">Inicio</a>
      <a href="./payments.html">Pagos</a>
      <a href="./dashboard.html">Panel</a>
    </nav>
  </header>

  <main class="dash-shell">
    <section class="dash-panel">
      <div class="panel-head">
        <div>
          <p class="dash-kicker">Tienda demo</p>
          <h2>Productos para entrenamiento</h2>
        </div>
      </div>
      <div class="panel-content">
        <div class="module-grid">
          <article><strong>Proteina Whey</strong><span>Suplemento para masa muscular.</span><strong>$800 MXN</strong><button class="mini-btn">Comprar</button></article>
          <article><strong>Creatina</strong><span>Apoyo para rendimiento fisico.</span><strong>$500 MXN</strong><button class="mini-btn">Comprar</button></article>
          <article><strong>Guantes Gym</strong><span>Agarre y proteccion para entrenamiento.</span><strong>$250 MXN</strong><button class="mini-btn">Comprar</button></article>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.querySelectorAll(".mini-btn").forEach((button) => {
      button.addEventListener("click", () => alert("Compra demo. Se conectara a la pasarela de pagos."));
    });
  </script>
</body>
</html>
