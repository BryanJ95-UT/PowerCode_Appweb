<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contacto | Power Code</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="dash-header">
    <a class="dash-brand" href="../index.html">
      <img src="../img/logo.svg" alt="Power Code">
      <span>Contacto</span>
    </a>
    <nav class="dash-actions">
      <a href="../index.html">Inicio</a>
      <a href="./memberships.html">Membresias</a>
      <a href="./login.html">Ingresar</a>
    </nav>
  </header>

  <main class="dash-shell">
    <section class="dash-panel">
      <div class="panel-head">
        <div>
          <p class="dash-kicker">Equipo</p>
          <h2>Power Code</h2>
        </div>
      </div>
      <div class="panel-content">
        <div class="module-grid">
          <article>
            <strong>Que es</strong>
            <span>Una plataforma web para administrar gimnasios, rutinas, pagos, membresias y apoyos deportivos.</span>
          </article>
          <article>
            <strong>Integrantes</strong>
            <span>Angel, Bryan, Emigdio y Alan.</span>
          </article>
          <article>
            <strong>Soporte</strong>
            <span>contacto@powercode.mx</span>
          </article>
        </div>

        <form class="inline-form contact-form" id="contactForm">
          <input name="nombre" placeholder="Nombre" required>
          <input type="email" name="correo" placeholder="Correo" required>
          <input name="mensaje" placeholder="Mensaje" required>
          <button type="submit">Enviar</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("contactForm").addEventListener("submit", (event) => {
      event.preventDefault();
      alert("Mensaje recibido. Lo conectaremos al modulo de reportes en el siguiente avance.");
      event.currentTarget.reset();
    });
  </script>
</body>
</html>
