<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Restablecer contraseña | Power Code</title>
  <link rel="stylesheet" href="../css/styles.css">
</head>

<body class="auth-body">

  <main class="auth-wrapper reset-center">
    <section class="auth-card">

      <h1 class="auth-title">Nueva contraseña</h1>
      <p class="auth-subtitle">Ingresa tu nueva contraseña segura.</p>

      <form id="resetForm" class="auth-form active">
        
        <div class="field-group">
          <label>Nueva contraseña</label>
          <input type="password" id="password" placeholder="********" required>
        </div>

        <button type="submit" class="btn primary auth-btn">
          GUARDAR CONTRASEÑA
        </button>

      </form>

    </section>
  </main>

  <script>
  const API_URL = "http://localhost:3000/api";
  const token = new URLSearchParams(window.location.search).get("token");

  document.getElementById("resetForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const password = document.getElementById("password").value;

    const response = await fetch(`${API_URL}/reset-password`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ token, password })
    });

    const result = await response.json();

    alert(result.message);

    if (response.ok) {
    window.location.href = "./login.html";
    }
  });
  </script>

  <div id="toast"></div>
</body>
</html>
