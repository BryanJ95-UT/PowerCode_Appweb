<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Apoyos | Power Code</title>
  <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>
  <header class="dash-header">
    <a class="dash-brand" href="../index.html">
      <img src="../img/logo.svg" alt="Power Code">
      <span>Apoyos</span>
    </a>
    <nav class="dash-actions">
      <a href="../index.html">Inicio</a>
      <a href="./dashboard.html">Panel</a>
      <a href="./contact.html">Contacto</a>
    </nav>
  </header>

  <main class="dash-shell">
    <section class="dash-hero">
      <div>
        <p class="dash-kicker">Impacto social</p>
        <h1>Becas y apoyos</h1>
        <p>Postulacion para estudiantes, atletas y personas con recursos limitados.</p>
      </div>
      <div class="dash-user-card">
        <span>Modulo social</span>
        <strong>Instituciones y talento deportivo</strong>
      </div>
    </section>

    <section class="dash-panel">
      <div class="panel-head">
        <div>
          <p class="dash-kicker">Solicitud</p>
          <h2>Enviar postulacion</h2>
        </div>
      </div>
      <div class="panel-content">
        <form class="profile-form" id="supportForm">
          <label>Nombre completo<input name="nombre" required></label>
          <label>Correo<input type="email" name="correo" required></label>
          <label>Tipo de apoyo<input name="tipo" placeholder="Beca, apoyo economico, talento deportivo" required></label>
          <label>Motivo<input name="motivo" placeholder="Describe tu situacion" required></label>
          <button class="save-btn" type="submit">Enviar solicitud</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    document.getElementById("supportForm").addEventListener("submit", (event) => {
      event.preventDefault();
      alert("Solicitud registrada como prototipo. Despues la conectamos a becas e instituciones.");
      event.currentTarget.reset();
    });
  </script>
</body>
</html>
